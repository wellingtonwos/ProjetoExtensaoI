name: CI Frontend

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - pipeline-only
    paths:
      - 'Source/Client/carneup-frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'Source/Client/carneup-frontend/**'
      - '.github/workflows/ci-frontend.yml'

permissions:
  contents: read
  packages: write

env:
  FRONTEND_DIR: Source/Client/carneup-frontend
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/projeto-frontend

jobs:
  pipeline:
    name: Validate, build and push frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (if present)
        run: npm test --if-present

      - name: Build (if present)
        run: npm run build --if-present

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        if: github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.FRONTEND_DIR }}
          file: ${{ env.FRONTEND_DIR }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
